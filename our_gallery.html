<style>
body {
    background-color: #0c0f0f;
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}
        .museum-spotlight {
            background: radial-gradient(circle at 50% 30%, rgba(220, 20, 60, 0.12) 0%, rgba(18, 20, 20, 0) 70%);
        }
        .polaroid-container {
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            -ms-overflow-style: none;
            scrollbar-width: none;
            padding: 20px 20px;
            gap: 25px;
            align-items: center;

            -webkit-overflow-scrolling: touch;
        }
        .polaroid-container::-webkit-scrollbar {
            display: none;
        }
        .polaroid-card {
            flex: 0 0 auto;
            scroll-snap-align: center;
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.7), inset 0 0 40px rgba(255, 255, 255, 0.05);
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.8s ease;
            opacity: 0;
            transform: translateX(100px) rotate(0deg);
        }
        .polaroid-card.active {
            opacity: 1;
            transform: translateX(0) rotate(var(--rotation));
        }
        .polaroid-card:hover {
            transform: scale(1.05) rotate(0deg) !important;
            z-index: 50;
        }
        .handwriting {
            font-family: 'EB Garamond', serif;
            font-style: italic;
        }
        .polaroid-container {
            scroll-behavior: smooth;
        }
        
        .petal {
        position: fixed;
        top: -10%;
        user-select: none;
        pointer-events: none;
        z-index: 10;
        animation-name: fall;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        }

        @keyframes fall {
        0% {
            transform: translateY(0) rotate(0deg) translateX(0);
            opacity: 1;
        }
        100% {
            transform: translateY(110vh) rotate(360deg) translateX(100px);
            opacity: 0;
        }
        }
        
        #transition-overlay {
        position: fixed;
        inset: 0;
        background: #0c0f0f;
        opacity: 0;
        pointer-events: none;
        z-index: 9999;
        transition: opacity 0.6s ease;
    }

        #transition-overlay.active {
        opacity: 1;
    }
    /* PAGE SCROLLBAR - same as Pasted code (1) */

    ::-webkit-scrollbar {
        width: 6px;
    }

    ::-webkit-scrollbar-track {
        background: #1a1c1c;
    }

    ::-webkit-scrollbar-thumb {
        background: #47242b;
        border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: #dc143c;
    }

    @media (max-width: 768px) {
    .polaroid-card {
        width: 260px;
    }
}

<script>
    // Intersection Observer for the horizontal entries
    const observerOptions = {
        threshold: 0.1,
        root: document.getElementById('galleryContainer'),
        rootMargin: '0px 200px 0px 200px'
    };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('active');
            }
        });
    }, observerOptions);

    document.querySelectorAll('.polaroid-card').forEach(el => observer.observe(el));

    // Initial active class for elements already in view
    setTimeout(() => {
        document.querySelectorAll('.polaroid-card').forEach((el) => {
            const rect = el.getBoundingClientRect();
            if (rect.left < window.innerWidth) {
                el.classList.add('active');
            }
        });
    }, 100);

    // Spotlight mouse move effect
    document.addEventListener('mousemove', (e) => {
        const spotlight = document.querySelector('.museum-spotlight');
        if (spotlight) {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            spotlight.style.background =
                `radial-gradient(circle at ${x}% ${y}%, rgba(220, 20, 60, 0.1) 0%, rgba(18, 20, 20, 0) 65%)`;
        }
    });

    // FIXED SCROLL
    const container = document.getElementById('galleryContainer');

    container.addEventListener('wheel', (evt) => {
        if (Math.abs(evt.deltaY) > Math.abs(evt.deltaX)) {
            evt.preventDefault();

            container.scrollBy({
                left: evt.deltaY * 1.2,
                behavior: 'smooth'
            });
        }
    }, { passive: false });

     // Petal system
    const petalContainer = document.getElementById('petal-container');
    const petalColors = ['#DC143C', '#920022', '#680015', '#ffb3b3'];

    function createPetal() {
        const petal = document.createElement('div');
        petal.classList.add('petal');
        const size = Math.random() * 15 + 10;
        const color = petalColors[Math.floor(Math.random() * petalColors.length)];
        const left = Math.random() * 100;
        const duration = Math.random() * 4 + 3;
        const delay = Math.random() * 2;
        petal.style.width = `${size}px`;
        petal.style.height = `${size * 1.2}px`;
        petal.style.backgroundColor = color;
        petal.style.left = `${left}%`;
        petal.style.animationDuration = `${duration}s`;
        petal.style.animationDelay = `${delay}s`;
        petal.style.borderRadius = '50% 0 50% 50%';
        petal.style.filter = 'blur(1px)';
        petal.style.opacity = Math.random() * 0.6 + 0.2;
        petalContainer.appendChild(petal);
        setTimeout(() => { petal.remove(); }, (duration + delay) * 1000);
    }

    for (let i = 0; i < 60; i++) { createPetal(); }
    setInterval(createPetal, 150);

    // SONG FOR YOU TRANSITION
    document.getElementById('gallery-btn').addEventListener('click', () => {

        const overlay = document.getElementById('transition-overlay');

        overlay.classList.add('active');

        setTimeout(() => {
            window.location.href = 'song_for_you.html';
        }, 600);
    });
</script>
